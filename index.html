<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Client Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #18181c;
  --surface2: #1f1f25;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0eff4;
  --muted: #8b8a96;
  --accent: #b49cf8;
  --accent-dim: rgba(180,156,248,0.12);
  --accent-dim2: rgba(180,156,248,0.2);
  --green: #5de8a8;
  --green-dim: rgba(93,232,168,0.12);
  --amber: #f5c542;
  --amber-dim: rgba(245,197,66,0.12);
  --red: #f97066;
  --red-dim: rgba(249,112,102,0.12);
  --radius: 10px;
  --radius-lg: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:8px 12px;margin-bottom:16px}
.logo-text{font-size:22px;font-weight:600;letter-spacing:-0.5px;color:var(--text)}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-top:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;color:var(--muted);font-size:13px;font-weight:400;transition:all 0.15s;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);background:var(--accent-dim);font-weight:500}
.nav-icon{width:16px;height:16px;opacity:0.7;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
.sidebar-tag{font-size:11px;color:var(--muted);padding:4px 12px}

/* Main */
.main{padding:32px 36px;overflow-y:auto}
.page{display:none}.page.active{display:block}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-size:20px;font-weight:600;letter-spacing:-0.3px}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;border:none;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--accent);color:#0e0e10}
.btn-primary:hover{background:#c8b4ff;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:var(--surface2)}
.btn-sm{padding:5px 11px;font-size:12px}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.metric-val{font-size:26px;font-weight:600;letter-spacing:-0.5px;font-family:'DM Mono',monospace}
.metric-val.green{color:var(--green)}
.metric-val.accent{color:var(--accent)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

/* Client rows */
.client-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.client-row:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent);flex-shrink:0;letter-spacing:0.5px}
.client-meta{flex:1;min-width:0}
.client-name{font-weight:500;font-size:14px}
.client-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rate-pill{font-family:'DM Mono',monospace;font-size:12px;color:var(--green);background:var(--green-dim);padding:3px 9px;border-radius:20px;white-space:nowrap}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;letter-spacing:0.2px}
.badge-active{background:var(--green-dim);color:var(--green)}
.badge-paid{background:var(--green-dim);color:var(--green)}
.badge-pending{background:var(--amber-dim);color:var(--amber)}
.badge-unpaid{background:var(--red-dim);color:var(--red)}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:8px 10px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500;border-bottom:1px solid var(--border)}
.data-table td{padding:11px 10px;border-bottom:1px solid var(--border)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--surface2)}
.amount-cell{font-family:'DM Mono',monospace;color:var(--green);font-weight:500}

/* Checklist */
.checklist{list-style:none}
.checklist li{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.checklist li:last-child{border-bottom:none}
.check-box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.15s;background:transparent}
.check-box.done{background:var(--green);border-color:var(--green)}
.check-box.done svg{display:block}
.check-box svg{display:none;width:11px;height:11px}
.progress-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:8px 0 16px}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:28px;width:92%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.close-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:0 4px}
.close-btn:hover{color:var(--text)}

/* Forms */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:72px}
select option{background:var(--surface2)}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:var(--radius);padding:3px;margin-bottom:18px;width:fit-content}
.tab{padding:5px 14px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.tab.active{background:var(--surface);color:var(--text)}
.tab-section{display:none}.tab-section.active{display:block}

/* Activity */
.activity-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.activity-row:last-child{border-bottom:none}

/* Empty */
.empty{text-align:center;padding:32px;color:var(--muted);font-size:13px}

/* Dot indicator */
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}

@media(max-width:800px){
  .layout{grid-template-columns:1fr}
  .sidebar{height:auto;position:static;flex-direction:row;flex-wrap:wrap;padding:12px}
  .logo{margin-bottom:0}
  .metrics-grid{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .main{padding:20px 16px}
}
</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-text">LLM</div>
    <div class="logo-sub">Client Hub</div>
  </div>
  <button class="nav-item active" onclick="showPage('dashboard',this)">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
    Dashboard
  </button>
  <button class="nav-item" onclick="showPage('clients',this)">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
    Clients
  </button>
  <button class="nav-item" onclick="showPage('payments',this)">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="14" height="9" rx="1.5"/><path d="M1 7h14"/><path d="M4 10.5h2"/></svg>
    Payments
  </button>
  <button class="nav-item" onclick="showPage('onboarding',this)">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M3 8h7M3 12h5"/><circle cx="13" cy="11" r="2.5"/><path d="M11.5 11l1 1 1.5-1.5"/></svg>
    Onboarding
  </button>
  <div class="sidebar-footer">
    <div class="sidebar-tag">The Cimone Experience</div>
  </div>
</aside>

<!-- Main -->
<main class="main">

  <!-- Dashboard -->
  <div id="page-dashboard" class="page active">
    <div class="page-header">
      <div><div class="page-title">Dashboard</div><div class="page-sub">Welcome back, Morgan</div></div>
    </div>
    <div class="metrics-grid" id="dash-metrics"></div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">Recent payments</div>
        <div id="dash-recent"></div>
      </div>
      <div class="card">
        <div class="card-title">Upcoming invoices</div>
        <div id="dash-upcoming"></div>
      </div>
    </div>
  </div>

  <!-- Clients -->
  <div id="page-clients" class="page">
    <div class="page-header">
      <div><div class="page-title">Clients</div><div class="page-sub" id="client-count">0 clients</div></div>
      <button class="btn btn-primary" onclick="openModal('add-client')">+ Add client</button>
    </div>
    <div class="card"><div id="client-list"></div></div>
  </div>

  <!-- Payments -->
  <div id="page-payments" class="page">
    <div class="page-header">
      <div><div class="page-title">Payments</div><div class="page-sub">Full payment history</div></div>
      <button class="btn btn-primary" onclick="openModal('add-payment')">+ Log payment</button>
    </div>
    <div class="card"><div id="payment-list"></div></div>
  </div>

  <!-- Onboarding -->
  <div id="page-onboarding" class="page">
    <div class="page-header">
      <div><div class="page-title">Onboarding</div><div class="page-sub">Track each client's setup progress</div></div>
    </div>
    <div class="card">
      <div class="form-group" style="margin-bottom:16px">
        <label>Select client</label>
        <select id="onboard-select" onchange="renderOnboarding()">
          <option value="">— choose a client —</option>
        </select>
      </div>
      <div id="onboard-body"><div class="empty">Select a client above</div></div>
    </div>
  </div>

</main>
</div>

<!-- Modal: Add Client -->
<div class="overlay" id="modal-add-client">
  <div class="modal">
    <div class="modal-title">Add new client <button class="close-btn" onclick="closeModal('add-client')">&times;</button></div>
    <div class="form-row">
      <div class="form-group"><label>Client name *</label><input id="c-name" placeholder="Christie Pratt"></div>
      <div class="form-group"><label>Business name</label><input id="c-biz" placeholder="Pratts Family Insurance"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input id="c-email" type="email" placeholder="email@example.com"></div>
      <div class="form-group"><label>Phone</label><input id="c-phone" placeholder="(901) 555-0100"></div>
    </div>
    <div class="form-group"><label>Services</label><input id="c-services" placeholder="Facebook & Instagram Management"></div>
    <div class="form-row">
      <div class="form-group"><label>Monthly retainer ($)</label><input id="c-rate" type="number" placeholder="450"></div>
      <div class="form-group"><label>Payment method</label>
        <select id="c-paymethod"><option>Zelle</option><option>CashApp</option><option>PayPal</option><option>Bank transfer</option><option>Other</option></select>
      </div>
    </div>
    <div class="form-group"><label>Start date</label><input id="c-start" type="date"></div>
    <div class="form-group"><label>Notes</label><textarea id="c-notes" placeholder="Any additional info..."></textarea></div>
    <button class="btn btn-primary" style="width:100%" onclick="addClient()">Save client</button>
  </div>
</div>

<!-- Modal: Add Payment -->
<div class="overlay" id="modal-add-payment">
  <div class="modal">
    <div class="modal-title">Log payment <button class="close-btn" onclick="closeModal('add-payment')">&times;</button></div>
    <div class="form-group"><label>Client</label><select id="p-client"></select></div>
    <div class="form-row">
      <div class="form-group"><label>Amount ($)</label><input id="p-amount" type="number" placeholder="225"></div>
      <div class="form-group"><label>Payment type</label>
        <select id="p-type"><option>50% deposit</option><option>Remaining balance</option><option>Full payment</option><option>Other</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Payment method</label>
        <select id="p-method"><option>Zelle</option><option>CashApp</option><option>PayPal</option><option>Bank transfer</option><option>Other</option></select>
      </div>
      <div class="form-group"><label>Date received</label><input id="p-date" type="date"></div>
    </div>
    <div class="form-group"><label>Notes</label><input id="p-notes" placeholder="e.g. April deposit"></div>
    <button class="btn btn-primary" style="width:100%" onclick="addPayment()">Save payment</button>
  </div>
</div>

<!-- Modal: View Client -->
<div class="overlay" id="modal-view-client">
  <div class="modal">
    <div class="modal-title"><span id="vc-name">Client</span><button class="close-btn" onclick="closeModal('view-client')">&times;</button></div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('info',this)">Info</button>
      <button class="tab" onclick="showTab('history',this)">Payments</button>
      <button class="tab" onclick="showTab('notes',this)">Notes</button>
    </div>
    <div id="tab-info" class="tab-section active"></div>
    <div id="tab-history" class="tab-section"></div>
    <div id="tab-notes" class="tab-section"></div>
  </div>
</div>

<script>
let state = {clients:[],payments:[],onboarding:{}};
let activeClient = null;

const STEPS = ['Contract sent','Contract signed','50% deposit received','Account access granted','Brand assets received','Strategy call completed','First post published','Fully onboarded'];

function load(){
  try{const d=localStorage.getItem('llm-hub');if(d)state=JSON.parse(d);}catch(e){}
  render();
}

function save(){try{localStorage.setItem('llm-hub',JSON.stringify(state));}catch(e){}}

function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmt$(n){return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return '';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function today(){return new Date().toISOString().split('T')[0];}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='onboarding') fillOnboardSelect();
  if(id==='dashboard') renderDashboard();
}

function openModal(id){
  if(id==='add-payment'){
    document.getElementById('p-client').innerHTML=state.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    document.getElementById('p-date').value=today();
  }
  if(id==='add-client') document.getElementById('c-start').value=today();
  document.getElementById('modal-'+id).classList.add('open');
}
function closeModal(id){document.getElementById('modal-'+id).classList.remove('open');}

function showTab(id,el){
  document.querySelectorAll('.tab-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='history') renderClientHistory();
  if(id==='notes') renderClientNotes();
}

function addClient(){
  const name=document.getElementById('c-name').value.trim();
  if(!name)return;
  const c={id:Date.now().toString(),name,biz:document.getElementById('c-biz').value.trim(),email:document.getElementById('c-email').value.trim(),phone:document.getElementById('c-phone').value.trim(),services:document.getElementById('c-services').value.trim(),rate:parseFloat(document.getElementById('c-rate').value)||0,payMethod:document.getElementById('c-paymethod').value,start:document.getElementById('c-start').value,notes:document.getElementById('c-notes').value.trim(),status:'active'};
  state.clients.push(c);
  state.onboarding[c.id]=Array(STEPS.length).fill(false);
  save();closeModal('add-client');
  ['c-name','c-biz','c-email','c-phone','c-services','c-rate','c-notes'].forEach(id=>document.getElementById(id).value='');
  render();
}

function addPayment(){
  const cid=document.getElementById('p-client').value;
  const amt=parseFloat(document.getElementById('p-amount').value);
  if(!cid||!amt)return;
  const p={id:Date.now().toString(),clientId:cid,amount:amt,type:document.getElementById('p-type').value,method:document.getElementById('p-method').value,date:document.getElementById('p-date').value||today(),notes:document.getElementById('p-notes').value.trim()};
  state.payments.push(p);
  save();closeModal('add-payment');
  document.getElementById('p-amount').value='';document.getElementById('p-notes').value='';
  render();
}

function viewClient(id){
  activeClient=state.clients.find(c=>c.id===id);
  if(!activeClient)return;
  document.getElementById('vc-name').textContent=activeClient.name;
  renderClientInfo();renderClientHistory();renderClientNotes();
  document.querySelectorAll('.tab-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-info').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
  openModal('view-client');
}

function renderClientInfo(){
  if(!activeClient)return;
  const c=activeClient;
  const paid=state.payments.filter(p=>p.clientId===c.id).reduce((s,p)=>s+p.amount,0);
  document.getElementById('tab-info').innerHTML=`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
      <div class="avatar" style="width:46px;height:46px;font-size:14px">${initials(c.name)}</div>
      <div><div style="font-weight:600;font-size:15px">${c.name}</div><div style="font-size:12px;color:var(--muted)">${c.biz||''}</div></div>
      <span class="badge badge-active" style="margin-left:auto"><span class="dot"></span>Active</span>
    </div>
    <table style="width:100%;font-size:13px;border-collapse:collapse">
      ${c.email?`<tr><td style="color:var(--muted);padding:6px 0;width:100px">Email</td><td>${c.email}</td></tr>`:''}
      ${c.phone?`<tr><td style="color:var(--muted);padding:6px 0">Phone</td><td>${c.phone}</td></tr>`:''}
      ${c.services?`<tr><td style="color:var(--muted);padding:6px 0">Services</td><td>${c.services}</td></tr>`:''}
      <tr><td style="color:var(--muted);padding:6px 0">Retainer</td><td style="font-family:'DM Mono',monospace;color:var(--green)">${fmt$(c.rate)}/mo</td></tr>
      <tr><td style="color:var(--muted);padding:6px 0">Pay via</td><td>${c.payMethod||'—'}</td></tr>
      ${c.start?`<tr><td style="color:var(--muted);padding:6px 0">Started</td><td>${fmtDate(c.start)}</td></tr>`:''}
      <tr><td style="color:var(--muted);padding:6px 0">Total paid</td><td style="font-family:'DM Mono',monospace;color:var(--green);font-weight:600">${fmt$(paid)}</td></tr>
    </table>
  `;
}

function renderClientHistory(){
  if(!activeClient)return;
  const pays=state.payments.filter(p=>p.clientId===activeClient.id).sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('tab-history');
  if(!pays.length){el.innerHTML='<div class="empty">No payments yet</div>';return;}
  el.innerHTML=pays.map(p=>`<div class="activity-row"><div><div style="font-weight:500">${p.type}</div><div style="font-size:11px;color:var(--muted)">${p.method} · ${fmtDate(p.date)}${p.notes?' · '+p.notes:''}</div></div><div style="font-family:'DM Mono',monospace;color:var(--green)">${fmt$(p.amount)}</div></div>`).join('');
}

function renderClientNotes(){
  if(!activeClient)return;
  document.getElementById('tab-notes').innerHTML=`
    <div class="form-group"><label>Notes</label><textarea id="note-field" style="min-height:120px">${activeClient.notes||''}</textarea></div>
    <button class="btn btn-primary" style="width:100%" onclick="saveClientNote()">Save notes</button>
  `;
}

function saveClientNote(){
  if(!activeClient)return;
  const val=document.getElementById('note-field').value;
  activeClient.notes=val;
  const i=state.clients.findIndex(c=>c.id===activeClient.id);
  if(i>=0)state.clients[i].notes=val;
  save();
  const btn=event.target;btn.textContent='Saved!';setTimeout(()=>btn.textContent='Save notes',1500);
}

function fillOnboardSelect(){
  const sel=document.getElementById('onboard-select');
  const cur=sel.value;
  sel.innerHTML='<option value="">— choose a client —</option>'+state.clients.map(c=>`<option value="${c.id}"${c.id===cur?' selected':''}>${c.name}${c.biz?' — '+c.biz:''}</option>`).join('');
  if(cur)renderOnboarding();
}

function renderOnboarding(){
  const cid=document.getElementById('onboard-select').value;
  const el=document.getElementById('onboard-body');
  if(!cid){el.innerHTML='<div class="empty">Select a client above</div>';return;}
  if(!state.onboarding[cid])state.onboarding[cid]=Array(STEPS.length).fill(false);
  const steps=state.onboarding[cid];
  const done=steps.filter(Boolean).length;
  const pct=Math.round(done/STEPS.length*100);
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted)"><span>${done} of ${STEPS.length} steps complete</span><span style="font-weight:600;color:var(--text)">${pct}%</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <ul class="checklist">${STEPS.map((s,i)=>`
      <li>
        <div class="check-box ${steps[i]?'done':''}" onclick="toggleStep('${cid}',${i})">
          <svg viewBox="0 0 11 9" fill="none" stroke="#0e0e10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4.5l3 3 6-7"/></svg>
        </div>
        <span style="${steps[i]?'color:var(--muted);text-decoration:line-through':''}">  ${s}</span>
      </li>`).join('')}
    </ul>
  `;
}

function toggleStep(cid,i){
  if(!state.onboarding[cid])state.onboarding[cid]=Array(STEPS.length).fill(false);
  state.onboarding[cid][i]=!state.onboarding[cid][i];
  save();renderOnboarding();
}

function renderDashboard(){
  const mrr=state.clients.filter(c=>c.status==='active').reduce((s,c)=>s+c.rate,0);
  const total=state.payments.reduce((s,p)=>s+p.amount,0);
  document.getElementById('dash-metrics').innerHTML=`
    <div class="metric-card"><div class="metric-label">Total clients</div><div class="metric-val accent">${state.clients.length}</div></div>
    <div class="metric-card"><div class="metric-label">Active clients</div><div class="metric-val">${state.clients.filter(c=>c.status==='active').length}</div></div>
    <div class="metric-card"><div class="metric-label">Monthly revenue</div><div class="metric-val green">${fmt$(mrr)}</div></div>
    <div class="metric-card"><div class="metric-label">Total collected</div><div class="metric-val green">${fmt$(total)}</div></div>
  `;
  const recent=[...state.payments].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const rEl=document.getElementById('dash-recent');
  rEl.innerHTML=recent.length?recent.map(p=>{const c=state.clients.find(cl=>cl.id===p.clientId);return`<div class="activity-row"><div><div style="font-weight:500;font-size:13px">${c?c.name:'—'}</div><div style="font-size:11px;color:var(--muted)">${p.type} · ${fmtDate(p.date)}</div></div><div style="font-family:'DM Mono',monospace;color:var(--green);font-size:13px">${fmt$(p.amount)}</div></div>`;}).join(''):'<div class="empty">No payments yet</div>';
  const uEl=document.getElementById('dash-upcoming');
  const active=state.clients.filter(c=>c.status==='active'&&c.rate>0);
  uEl.innerHTML=active.length?active.map(c=>{const due=new Date();due.setDate(1);due.setMonth(due.getMonth()+1);return`<div class="activity-row"><div><div style="font-weight:500;font-size:13px">${c.name}</div><div style="font-size:11px;color:var(--muted)">${c.payMethod||''} · Due ${due.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div></div><div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--amber)">${fmt$(c.rate)}</div></div>`;}).join(''):'<div class="empty">No upcoming payments</div>';
}

function renderClients(){
  const el=document.getElementById('client-list');
  document.getElementById('client-count').textContent=state.clients.length+' client'+(state.clients.length!==1?'s':'');
  el.innerHTML=state.clients.length?state.clients.map(c=>`
    <div class="client-row">
      <div class="avatar">${initials(c.name)}</div>
      <div class="client-meta">
        <div class="client-name">${c.name}</div>
        <div class="client-sub">${[c.biz,c.services].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="rate-pill">${fmt$(c.rate)}/mo</div>
      <span class="badge badge-active" style="margin:0 6px"><span class="dot"></span>Active</span>
      <button class="btn btn-ghost btn-sm" onclick="viewClient('${c.id}')">View</button>
    </div>
  `).join(''):'<div class="empty">No clients yet — click Add client to get started</div>';
}

function renderPayments(){
  const el=document.getElementById('payment-list');
  const sorted=[...state.payments].sort((a,b)=>b.date.localeCompare(a.date));
  el.innerHTML=sorted.length?`<table class="data-table"><thead><tr><th>Client</th><th>Type</th><th>Method</th><th>Date</th><th style="text-align:right">Amount</th></tr></thead><tbody>${sorted.map(p=>{const c=state.clients.find(cl=>cl.id===p.clientId);return`<tr><td style="font-weight:500">${c?c.name:'—'}</td><td style="color:var(--muted)">${p.type}</td><td style="color:var(--muted)">${p.method}</td><td style="color:var(--muted)">${fmtDate(p.date)}</td><td class="amount-cell" style="text-align:right">${fmt$(p.amount)}</td></tr>`;}).join('')}</tbody></table>`:'<div class="empty">No payments logged yet</div>';
}

function render(){renderDashboard();renderClients();renderPayments();}

document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

load();
</script>
</body>
</html>
